<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Hub</title>
    <link rel="stylesheet" href="styles.css">

    <body>
        <h1>Study Hub</h1>
        <div id="container">
            <div id="timer-card">
                <h2>Pomodoro Timer</h2>
                <div id="time">25:00</div>

                <div class="buttons">
                    <button>Start</button>
                    <button>Pause</button>
                    <button>Reset</button>
                </div>
            </div>

            <div id="todo-card">
                <h2>To-do List</h2>

                <input type="text" placeholder="Add a new task">
                <button>Add</button>

                <ul id="task-list">
                </ul>
            </div>

                <div id="quotes-card">
                    <h2>Motivational Quotes</h2>

                    <p id="quote">Click the button for a new motivational quote!</p>

                    <button>New Quote</button>
                </div>
            </div>
        </div>
    </body>
    <script src="script.js"></script>
</html>
